function initForceGraph() {
  const canvas = document.getElementById('graph-canvas');
  if (!canvas) return;

  const statusColors = { open: '#a1a1aa', in_progress: '#fbbf24', closed: '#4ade80', blocked: '#f87171' };
  const nodes = ISSUES.map(i => ({
    id: i.id,
    r: 6 + Math.min((metrics.inDeg[i.id] || 0), 8) * 2.5,
    color: statusColors[effectiveStatus(i)] || '#71717a',
    critical: metrics.cpSet?.has(i.id),
    shortTitle: (i.title || '').slice(0, 22) + ((i.title || '').length > 22 ? '..' : ''),
    status: effectiveStatus(i)
  }));

  const edges = [];
  DEPS.forEach(d => {
    const from = norm(d.depends_on_id), to = norm(d.issue_id);
    if (!issueMap[from] || !issueMap[to]) return;
    const isCritical = d.type === 'blocks' && metrics.cpSet?.has(from) && metrics.cpSet?.has(to);
    edges.push({ from: to, to: from, type: d.type, critical: isCritical }); // Edge: blocked → blocker (dependency direction)
  });

  forceGraph = new ForceGraph(canvas, nodes, edges);
  // Auto-fit after simulation settles
  setTimeout(() => forceGraph.fitToView(), 1500);
  setTimeout(() => forceGraph.fitToView(), 3000);

  document.getElementById('graph-fit')?.addEventListener('click', () => forceGraph.fitToView());
  document.getElementById('graph-labels')?.addEventListener('click', function() {
    forceGraph.showLabels = !forceGraph.showLabels;
    this.classList.toggle('active');
    if (!forceGraph.running) forceGraph.draw();
  });
  document.getElementById('graph-reheat')?.addEventListener('click', () => { forceGraph.alpha = 1; if (!forceGraph.running) forceGraph.resume(); });

  // Graph search
  const graphSearchEl = document.getElementById('graph-search');
  graphSearchEl?.addEventListener('input', e => {
    const q = e.target.value.toLowerCase().trim();
    forceGraph.searchQuery = q;
    if (!forceGraph.running) forceGraph.draw();
  });

  // Graph status filters
  const hiddenStatuses = new Set();
  document.querySelectorAll('.graph-status-btn').forEach(btn => {
    btn.addEventListener('click', function() {
      const s = this.dataset.status;
      this.classList.toggle('active');
      if (hiddenStatuses.has(s)) hiddenStatuses.delete(s); else hiddenStatuses.add(s);
      forceGraph.hiddenStatuses = hiddenStatuses;
      if (!forceGraph.running) forceGraph.draw();
    });
  });
  forceGraph.hiddenStatuses = hiddenStatuses;
}

// ─── Render: Epics ───────────────────────────────────────────────────────────
function renderEpicsView() {
  const epics = ISSUES.filter(i => i.issue_type === 'epic').sort((a, b) => (a.priority ?? 2) - (b.priority ?? 2));
  let html = '<div id="view-epics" class="view">';
  if (!epics.length) { html += '<div class="empty-state">No epics found</div></div>'; return html; }

  epics.forEach(e => {
    const kids = (childrenOf[e.id] || []).map(id => issueMap[id]).filter(Boolean);
    const done = kids.filter(k => k.status === 'closed').length;
    const pct = kids.length > 0 ? Math.round(done / kids.length * 100) : 0;

    html += `<div class="epic-card"><div class="epic-header" data-epic="${esc(e.id)}">
      <span class="epic-toggle">&#9654;</span>
      <div class="epic-info"><div class="epic-name">${esc(e.title)}</div><div class="epic-sub">${esc(e.description?.slice(0, 100) || '')}</div></div>
      <div class="epic-progress"><div class="epic-bar"><div class="epic-bar-fill" style="width:0%" data-w="${pct}%"></div></div><span class="epic-pct">${done}/${kids.length}</span></div>
    </div><div class="epic-children" data-children="${esc(e.id)}">`;

    const sorted = kids.sort((a, b) => {
      if (a.status === 'closed' && b.status !== 'closed') return 1;
      if (a.status !== 'closed' && b.status === 'closed') return -1;
      return (a.priority ?? 2) - (b.priority ?? 2);
    });
    sorted.forEach(k => {
      const es = effectiveStatus(k);
      const dotColor = es === 'closed' ? 'var(--status-closed)' : es === 'blocked' ? 'var(--status-blocked)' : es === 'in_progress' ? 'var(--status-wip)' : 'var(--status-open)';
      html += `<div class="epic-child" data-id="${esc(k.id)}">
        <div class="epic-child-status" style="background:${dotColor}"></div>
        <span class="pri-badge p${k.priority ?? 2}" style="font-size:0.55rem;padding:0 0.2rem">${pShort(k.priority)}</span>
        <span class="epic-child-title">${esc(k.title)}</span>
        <span class="epic-child-id">${esc(k.id)}</span>
      </div>`;
    });
    html += '</div></div>';
  });
  html += '</div>';
  return html;
}

// ─── Render: Insights ────────────────────────────────────────────────────────
function renderInsightsView() {
  const m = metrics;
  // Top bottlenecks (issues that block the most other issues)
  const bottlenecks = ISSUES.filter(i => i.status !== 'closed').map(i => ({ id: i.id, title: i.title, val: m.outDeg[i.id] || 0 })).sort((a, b) => b.val - a.val).filter(b => b.val > 0).slice(0, 6);

  // Impact ranking (top non-closed)
  const impactList = ISSUES.filter(i => i.status !== 'closed').map(i => ({ id: i.id, title: i.title, val: m.impact[i.id] || 0 })).sort((a, b) => b.val - a.val).slice(0, 8);

  let html = '<div id="view-insights" class="view"><div class="insights-grid">';

  // Graph Health
  html += `<div class="insight-card"><div class="insight-hd">Graph Health</div><div class="insight-body">
    <div class="insight-metric"><span class="insight-metric-label">Nodes</span><span class="insight-metric-val">${m.nodeCount}</span></div>
    <div class="insight-metric"><span class="insight-metric-label">Blocking edges</span><span class="insight-metric-val">${m.edgeCount}</span></div>
    <div class="insight-metric"><span class="insight-metric-label">Density</span><span class="insight-metric-val">${m.density.toFixed(4)}</span></div>
    <div class="insight-metric"><span class="insight-metric-label">Avg degree</span><span class="insight-metric-val">${m.avgDeg.toFixed(1)}</span></div>
    <div class="insight-metric"><span class="insight-metric-label">Components</span><span class="insight-metric-val">${m.components}</span></div>
    <div class="insight-metric"><span class="insight-metric-label">Cycles detected</span><span class="insight-metric-val">${m.hasCycle ? 'Yes' : 'None'}</span></div>
  </div></div>`;

  // Critical Path
  html += `<div class="insight-card"><div class="insight-hd">Critical Path (${m.criticalPath.length} nodes)</div><div class="insight-body">`;
  if (m.criticalPath.length > 0) {
    html += '<div class="insight-path">';
    m.criticalPath.forEach((id, i) => {
      const issue = issueMap[id];
      html += `<span class="path-node" title="${esc(issue?.title || id)}">${esc(id)}</span>`;
      if (i < m.criticalPath.length - 1) html += '<span class="path-arrow">&#8594;</span>';
    });
    html += '</div>';
  } else html += '<div class="no-cycles">No blocking dependency chains found</div>';
  html += '</div></div>';

  // Top Bottlenecks
  html += `<div class="insight-card"><div class="insight-hd">Top Bottlenecks</div><div class="insight-body">`;
  bottlenecks.forEach((b, i) => {
    html += `<div class="insight-row"><span class="insight-rank">${i + 1}.</span><span class="insight-label" title="${esc(b.title)}">${esc(b.title)}</span><span class="insight-val">blocks ${b.val}</span></div>`;
  });
  if (!bottlenecks.length) html += '<div class="empty-state">No bottlenecks</div>';
  html += '</div></div>';

  // Cascade Unblock Analysis
  const cascadeList = ISSUES.filter(i => i.status !== 'closed' && (m.cascadeUnblock[i.id] || 0) > 0)
    .map(i => ({ id: i.id, title: i.title, val: m.cascadeUnblock[i.id] }))
    .sort((a, b) => b.val - a.val).slice(0, 8);
  html += `<div class="insight-card"><div class="insight-hd">Cascade Unblock</div><div class="insight-body">`;
  if (cascadeList.length) {
    cascadeList.forEach((b, i) => {
      html += `<div class="insight-row"><span class="insight-rank">${i + 1}.</span><span class="insight-label" title="${esc(b.title)}">${esc(b.title)}</span><span class="insight-val">close → ${b.val} unblock</span></div>`;
    });
  } else html += '<div class="empty-state">No cascade unblocks available</div>';
  html += '</div></div>';

  // Impact Ranking
  html += `<div class="insight-card"><div class="insight-hd">Impact Ranking</div><div class="insight-body">`;
  impactList.forEach((b, i) => {
    html += `<div class="insight-row"><span class="insight-rank">${i + 1}.</span><span class="insight-label" title="${esc(b.title)}">${esc(b.title)}</span><span class="insight-val">${(b.val * 100).toFixed(0)}%</span></div>`;
  });
  html += '</div></div>';

  html += '</div></div>';
  return html;
}

// ─── Render: Forecast Timeline ────────────────────────────────────────────────
function renderForecastView() {
  const EPIC_HUES = ['#8b5cf6','#f59e0b','#06b6d4','#ec4899','#10b981','#f97316','#6366f1','#14b8a6','#e11d48','#84cc16'];
  const epicList = ISSUES.filter(i => i.issue_type === 'epic').sort((a, b) => (a.priority ?? 2) - (b.priority ?? 2));
  const epicColorMap = {};
  epicList.forEach((e, i) => { epicColorMap[e.id] = EPIC_HUES[i % EPIC_HUES.length]; });

  // Velocity: average closures per week over last 4 active weeks
  const vel = metrics.velocity || [];
  const activeWeeks = vel.filter(v => v > 0);
  const avgVelocity = activeWeeks.length > 0 ? activeWeeks.reduce((a, b) => a + b, 0) / activeWeeks.length : 1;

  // Estimate days for each open issue
  const typeMultiplier = { bug: 0.5, feature: 2, task: 1, chore: 0.5, epic: 0, decision: 0.3 };
  const prioMultiplier = [0.7, 0.85, 1, 1.2, 1.5]; // P0=fast, P4=slow
  const estimates = [];
  ISSUES.forEach(i => {
    if (i.status === 'closed' || i.issue_type === 'epic') return;
    const tMul = typeMultiplier[i.issue_type || 'task'] || 1;
    const pMul = prioMultiplier[clamp(i.priority ?? 2, 0, 4)];
    const depthFactor = 1 + (metrics.chainDepth[i.id] || 0) * 0.3;
    const baseDays = 2 * tMul * pMul;
    const estDays = baseDays * depthFactor / Math.max(avgVelocity / 5, 0.2);
    const low = estDays * 0.6;
    const high = estDays * 1.8;
    estimates.push({
      id: i.id, title: i.title, status: effectiveStatus(i),
      epicId: parentOf[i.id] || null,
      est: estDays, low, high,
      priority: i.priority ?? 2,
      wave: metrics.slack?.[i.id] ?? 0
    });
  });

  // Group by epic
  const grouped = {};
  const noEpic = [];
  estimates.forEach(e => {
    if (e.epicId) {
      if (!grouped[e.epicId]) grouped[e.epicId] = [];
      grouped[e.epicId].push(e);
    } else noEpic.push(e);
  });

  // Sort within groups by wave then priority
  const sortFn = (a, b) => a.wave - b.wave || a.priority - b.priority;
  Object.values(grouped).forEach(g => g.sort(sortFn));
  noEpic.sort(sortFn);

  const maxDays = Math.max(...estimates.map(e => e.high), 14);
  const statusDotColors = { open: 'var(--status-open)', in_progress: 'var(--status-wip)', blocked: 'var(--status-blocked)' };

  function renderRows(items, color) {
    let html = '';
    items.forEach(e => {
      const leftPct = (e.low / maxDays * 100).toFixed(1);
      const widthRangePct = ((e.high - e.low) / maxDays * 100).toFixed(1);
      const widthEstPct = (e.est / maxDays * 100).toFixed(1);
      html += `<div class="forecast-row">
        <div class="forecast-row-label">
          <div class="forecast-row-status" style="background:${statusDotColors[e.status] || 'var(--status-open)'}"></div>
          <span class="forecast-row-id">${esc(e.id)}</span>
          <span class="forecast-row-title" title="${esc(e.title)}">${esc(e.title)}</span>
        </div>
        <div class="forecast-row-track">
          <div class="forecast-bar forecast-bar-range" style="left:${leftPct}%;width:${widthRangePct}%;background:${color}"></div>
          <div class="forecast-bar forecast-bar-est" style="left:0;width:${widthEstPct}%;background:${color}">
            <span class="forecast-bar-lbl">${e.est.toFixed(1)}d</span>
          </div>
        </div>
      </div>`;
    });
    return html;
  }

  let html = `<div id="view-forecast" class="view"><div class="forecast-container">
    <div class="forecast-header">
      <span class="forecast-title">Forecast Timeline</span>
      <span class="forecast-meta">${estimates.length} open issues · avg ${avgVelocity.toFixed(1)} closures/wk</span>
    </div>`;

  // Epic groups
  epicList.forEach((epic, ei) => {
    const items = grouped[epic.id];
    if (!items || !items.length) return;
    const color = epicColorMap[epic.id];
    const kids = (childrenOf[epic.id] || []).map(id => issueMap[id]).filter(Boolean);
    const done = kids.filter(k => k.status === 'closed').length;
    const pct = kids.length > 0 ? Math.round(done / kids.length * 100) : 0;
    const epicETA = Math.max(...items.map(e => e.high)).toFixed(0);
    html += `<div class="forecast-epic-group">
      <div class="forecast-epic-hd">
        <div class="forecast-epic-dot" style="background:${color}"></div>
        <span class="forecast-epic-name">${esc(epic.title)}</span>
        <span class="forecast-epic-pct">${done}/${kids.length} (${pct}%) · ETA ~${epicETA}d</span>
      </div>`;
    html += renderRows(items, color);
    html += '</div>';
  });

  // Ungrouped
  if (noEpic.length) {
    html += `<div class="forecast-epic-group">
      <div class="forecast-epic-hd">
        <div class="forecast-epic-dot" style="background:#71717a"></div>
        <span class="forecast-epic-name">No Epic</span>
        <span class="forecast-epic-pct">${noEpic.length} issues</span>
      </div>`;
    html += renderRows(noEpic, '#71717a');
    html += '</div>';
  }

  // Scale
  const scaleSteps = 5;
  html += '<div class="forecast-scale">';
  for (let s = 0; s <= scaleSteps; s++) {
    html += `<span>${Math.round(maxDays / scaleSteps * s)}d</span>`;
  }
  html += '</div>';

  html += `<div class="forecast-note">Estimates based on type, priority, dependency depth, and recent velocity (${avgVelocity.toFixed(1)} issues/week). Solid bar = estimate, faded bar = range (60%-180%).</div>`;
  html += '</div></div>';
  return html;
}

// ─── Render: Flow (Layered DAG) ───────────────────────────────────────────────
function renderFlowView() {
  return `<div id="view-flow" class="view">
    <div class="flow-wrap">
      <canvas class="flow-canvas" id="flow-canvas"></canvas>
      <div class="flow-controls">
        <button class="graph-btn" id="flow-fit" title="Fit to view (F)">Fit</button>
        <button class="graph-btn active" id="flow-labels" title="Toggle labels">Labels</button>
        <button class="graph-btn" id="flow-closed" title="Show completed issues">Show Closed</button>
        <div class="flow-mode-sep"></div>
        <button class="graph-btn active" id="flow-mode-status" title="Color by status (default)">Status</button>
        <button class="graph-btn" id="flow-mode-slack" title="Color by slack (schedule flexibility)">Slack</button>
        <button class="graph-btn" id="flow-mode-epic" title="Color by parent epic">Epic</button>
        <div class="flow-mode-sep"></div>
        <button class="graph-btn" id="flow-whatif" title="What-If: click a node to simulate closing it">What-If</button>
      </div>
      <div class="flow-tooltip" id="flow-tooltip"></div>
      <div class="flow-info-badge" id="flow-info-badge"></div>
      <div class="flow-legend" id="flow-legend">
        <div class="flow-legend-item"><div class="flow-legend-dot" style="background:var(--status-open)"></div>Ready</div>
        <div class="flow-legend-item"><div class="flow-legend-dot" style="background:var(--status-wip)"></div>In Progress</div>
        <div class="flow-legend-item"><div class="flow-legend-dot" style="background:var(--status-blocked)"></div>Blocked</div>
        <div class="flow-legend-item"><div class="flow-legend-dot" style="background:var(--status-closed)"></div>Closed</div>
        <div class="flow-legend-item"><span style="color:var(--status-blocked);font-weight:600;font-size:0.8rem">—</span> Critical Path</div>
        <div class="flow-legend-item"><span style="font-size:0.8rem">⚠</span> Bridge Node</div>
      </div>
    </div>
  </div>`;
}

class FlowGraph {
  constructor(canvas) {
    this.canvas = canvas;
    this.ctx = canvas.getContext('2d');
    this.dpr = window.devicePixelRatio || 1;
    this.resize();

    this.colW = 260;
    this.nodeW = 215;
    this.nodeH = 64;
    this.nodeGapY = 14;
    this.epicGapY = 26;
    this.padX = 50;
    this.padY = 56;
    this.headerH = 40;

    this.ox = 0; this.oy = 0; this.scale = 1;
    this.hover = null; this.pan = null;
    this.showLabels = true;
    this.showClosed = false;
    this.running = true;
    this.animT = 0;
    this.colorMode = 'status'; // 'status' | 'slack' | 'epic'
    this.whatIfMode = false;
    this.whatIf = null; // { id, direct: Set, transitive: Set, epicImpact: [], animStart: number }

    // Epic color palette
    this.epicColors = {};
    const EPIC_HUES = ['#8b5cf6','#f59e0b','#06b6d4','#ec4899','#10b981','#f97316','#6366f1','#14b8a6','#e11d48','#84cc16'];
    const epics = ISSUES.filter(i => i.issue_type === 'epic').sort((a, b) => (a.priority ?? 2) - (b.priority ?? 2));
    epics.forEach((e, i) => { this.epicColors[e.id] = EPIC_HUES[i % EPIC_HUES.length]; });

    this.computeLayout();
    this.bindEvents();
    this.focusOnFrontier();
    this.animate();
  }

  resize() {
    const rect = this.canvas.parentElement.getBoundingClientRect();
    this.w = rect.width; this.h = rect.height;
    this.canvas.width = this.w * this.dpr;
    this.canvas.height = this.h * this.dpr;
    this.canvas.style.width = this.w + 'px';
    this.canvas.style.height = this.h + 'px';
    this.ctx.setTransform(this.dpr, 0, 0, this.dpr, 0, 0);
  }

  computeLayout() {
    const ids = new Set(ISSUES.map(i => i.id));
    const blockFwd = {}, blockRev = {};
    ISSUES.forEach(i => { blockFwd[i.id] = []; blockRev[i.id] = []; });
    DEPS.filter(d => d.type === 'blocks').forEach(d => {
      const blocker = norm(d.depends_on_id), blocked = norm(d.issue_id);
      if (!ids.has(blocker) || !ids.has(blocked)) return;
      blockFwd[blocker].push(blocked);
      blockRev[blocked].push(blocker);
    });

    // Compute waves via longest path from roots (Kahn's with DP)
    const wave = {};
    ISSUES.forEach(i => wave[i.id] = 0);
    const inDeg = {};
    ISSUES.forEach(i => inDeg[i.id] = blockRev[i.id].length);
    const queue = ISSUES.filter(i => inDeg[i.id] === 0).map(i => i.id);
    const processed = new Set();
    while (queue.length) {
      const id = queue.shift();
      if (processed.has(id)) continue;
      processed.add(id);
      blockFwd[id].forEach(next => {
        wave[next] = Math.max(wave[next], wave[id] + 1);
        inDeg[next]--;
        if (inDeg[next] === 0) queue.push(next);
      });
    }
    const maxW = Math.max(...Object.values(wave), 0);
    ISSUES.forEach(i => { if (!processed.has(i.id)) wave[i.id] = maxW + 1; });

    // Group by wave
    const waveGroups = {};
    ISSUES.forEach(i => {
      const w = wave[i.id];
      if (!waveGroups[w]) waveGroups[w] = [];
      waveGroups[w].push(i);
    });

    // Sort within each wave: epic group, then open before closed, then priority
    Object.values(waveGroups).forEach(group => {
      group.sort((a, b) => {
        const eA = parentOf[a.id] || (a.issue_type === 'epic' ? a.id : '');
        const eB = parentOf[b.id] || (b.issue_type === 'epic' ? b.id : '');
        if (eA !== eB) return eA.localeCompare(eB);
        const sA = a.status === 'closed' ? 1 : 0;
        const sB = b.status === 'closed' ? 1 : 0;
        if (sA !== sB) return sA - sB;
        return (a.priority ?? 2) - (b.priority ?? 2);
      });
    });

    // Compute node positions
    this.nodes = [];
    this.nodeMap = {};
    this.waveList = Object.keys(waveGroups).map(Number).sort((a, b) => a - b);

    this.waveList.forEach(w => {
      const group = waveGroups[w];
      let y = this.padY + this.headerH;
      let lastEpic = null;
      group.forEach(i => {
        const epic = parentOf[i.id] || (i.issue_type === 'epic' ? i.id : '');
        if (lastEpic !== null && epic !== lastEpic) y += this.epicGapY;
        lastEpic = epic;
        const epicId = parentOf[i.id] || (i.issue_type === 'epic' ? i.id : null);
        const node = {
          id: i.id,
          x: this.padX + w * this.colW + (this.colW - this.nodeW) / 2,
          y,
          w: this.nodeW,
          h: this.nodeH,
          wave: w,
          status: effectiveStatus(i),
          issue: i,
          critical: metrics.cpSet?.has(i.id),
          ready: effectiveStatus(i) === 'open' && !blockedSet.has(i.id) && i.status !== 'closed',
          epicId,
          isArticulation: metrics.articulationPts?.has(i.id),
          slack: metrics.slack?.[i.id] ?? 0
        };
        this.nodes.push(node);
        this.nodeMap[i.id] = node;
        y += this.nodeH + this.nodeGapY;
      });
    });

    // Blocking edges
    this.edges = [];
    DEPS.filter(d => d.type === 'blocks').forEach(d => {
      const from = norm(d.depends_on_id), to = norm(d.issue_id);
      if (this.nodeMap[from] && this.nodeMap[to]) {
        this.edges.push({ from, to, critical: metrics.cpSet?.has(from) && metrics.cpSet?.has(to) });
      }
    });

    // Bounds
    if (this.nodes.length) {
      this.contentW = Math.max(...this.nodes.map(n => n.x + n.w)) + this.padX;
      this.contentH = Math.max(...this.nodes.map(n => n.y + n.h)) + this.padY;
    } else {
      this.contentW = this.w; this.contentH = this.h;
    }

    // NOW frontier: boundary between closed and open work
    this.nowWave = -1;
    for (let i = 0; i < this.waveList.length - 1; i++) {
      const cur = waveGroups[this.waveList[i]] || [];
      const next = waveGroups[this.waveList[i + 1]] || [];
      if (cur.every(x => x.status === 'closed') && next.some(x => x.status !== 'closed')) {
        this.nowWave = this.waveList[i];
      }
    }
    // Also check mixed waves
    if (this.nowWave === -1) {
      this.waveList.forEach(w => {
        const group = waveGroups[w] || [];
        if (group.some(i => i.status === 'closed') && group.some(i => i.status !== 'closed')) {
          this.nowWave = Math.max(this.nowWave, w - 1);
        }
      });
    }

    // Wave stats
    this.waveStats = {};
    this.waveList.forEach(w => {
      const group = waveGroups[w] || [];
      this.waveStats[w] = { total: group.length, closed: group.filter(i => i.status === 'closed').length };
    });
  }

  screenToWorld(sx, sy) { return [(sx - this.ox) / this.scale, (sy - this.oy) / this.scale]; }

  nodeAt(sx, sy) {
    const [wx, wy] = this.screenToWorld(sx, sy);
    for (let i = this.nodes.length - 1; i >= 0; i--) {
      const n = this.nodes[i];
      if (!this.showClosed && n.status === 'closed') continue;
      if (wx >= n.x && wx <= n.x + n.w && wy >= n.y && wy <= n.y + n.h) return n;
    }
    return null;
  }

  fitToView() {
    const visible = this.showClosed ? this.nodes : this.nodes.filter(n => n.status !== 'closed');
    if (!visible.length) { if (this.nodes.length) { this.showClosed = true; return this.fitToView(); } return; }
    const mnx = Math.min(...visible.map(n => n.x)) - 30;
    const mny = Math.min(...visible.map(n => n.y)) - 50;
    const mxx = Math.max(...visible.map(n => n.x + n.w)) + 30;
    const mxy = Math.max(...visible.map(n => n.y + n.h)) + 30;
    const gw = mxx - mnx, gh = mxy - mny;
    this.scale = Math.min(this.w / gw, this.h / gh, 1.5) * 0.9;
    this.ox = (this.w - (mxx + mnx) * this.scale) / 2;
    this.oy = (this.h - (mxy + mny) * this.scale) / 2;
  }

  focusOnFrontier() {
    // Find actionable nodes: ready first, then WIP, then any open
    const open = this.nodes.filter(n => n.status !== 'closed');
    const readyNodes = open.filter(n => n.ready);
    const wipNodes = open.filter(n => n.status === 'in_progress');
    const anchor = readyNodes.length ? readyNodes : wipNodes.length ? wipNodes : open;
    if (!anchor.length) return this.fitToView();

    // Determine the wave range of these anchor nodes + 1 wave context each side
    const anchorWaves = new Set(anchor.map(n => n.wave));
    const minW = Math.min(...anchorWaves);
    const maxW = Math.max(...anchorWaves);
    const viewMin = Math.max(0, minW - 1);
    const viewMax = maxW + 1;

    // Collect all visible nodes in that range
    const inRange = open.filter(n => n.wave >= viewMin && n.wave <= viewMax);
    if (!inRange.length) return this.fitToView();

    const mnx = Math.min(...inRange.map(n => n.x)) - 40;
    const mny = Math.min(...inRange.map(n => n.y)) - 60;
    const mxx = Math.max(...inRange.map(n => n.x + n.w)) + 40;
    const mxy = Math.max(...inRange.map(n => n.y + n.h)) + 40;
    const gw = mxx - mnx, gh = mxy - mny;
    // Scale to fill viewport but never zoom in past 1.15 (keeps text crisp)
    this.scale = Math.min(this.w / gw, this.h / gh, 1.15);
    this.ox = (this.w - (mxx + mnx) * this.scale) / 2;
    this.oy = (this.h - (mxy + mny) * this.scale) / 2;
  }

  roundRect(x, y, w, h, r) {
    const ctx = this.ctx;
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.arcTo(x + w, y, x + w, y + r, r);
    ctx.lineTo(x + w, y + h - r);
    ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
    ctx.lineTo(x + r, y + h);
    ctx.arcTo(x, y + h, x, y + h - r, r);
    ctx.lineTo(x, y + r);
    ctx.arcTo(x, y, x + r, y, r);
    ctx.closePath();
  }

  simulateWhatIf(nodeId) {
    if (this.whatIf?.id === nodeId) { this.clearWhatIf(); return; }
    const direct = new Set(), transitive = new Set();
    // Simulate closing this node: find all issues that would become unblocked
    const simClosed = new Set([nodeId, ...ISSUES.filter(i => i.status === 'closed').map(i => i.id)]);
    // BFS: expand from nodeId through dependency graph
    const queue = [nodeId];
    while (queue.length) {
      const cur = queue.shift();
      (adjIn[cur] || []).forEach(e => {
        const dep = e.from;
        if (simClosed.has(dep) || transitive.has(dep)) return;
        const depIssue = issueMap[dep];
        if (!depIssue || depIssue.status === 'closed') return;
        // Check if ALL blockers of dep would be closed
        const allClosed = (adjOut[dep] || []).every(d => simClosed.has(d.to) || transitive.has(d.to) || d.to === nodeId);
        if (allClosed) {
          if (cur === nodeId) direct.add(dep); else transitive.add(dep);
          simClosed.add(dep);
          queue.push(dep);
        }
      });
    }
    // Epic impact
    const epicImpact = [];
    const allUnblocked = new Set([...direct, ...transitive]);
    const epicIds = [...new Set(ISSUES.filter(i => i.issue_type === 'epic').map(i => i.id))];
    epicIds.forEach(eid => {
      const kids = (childrenOf[eid] || []).map(id => issueMap[id]).filter(Boolean);
      const nowDone = kids.filter(k => k.status === 'closed').length;
      const wouldDone = kids.filter(k => k.status === 'closed' || allUnblocked.has(k.id) || k.id === nodeId).length;
      if (wouldDone > nowDone) {
        const epic = issueMap[eid];
        epicImpact.push({ name: epic?.title || eid, from: Math.round(nowDone / kids.length * 100), to: Math.round(wouldDone / kids.length * 100), delta: wouldDone - nowDone });
      }
    });
    this.whatIf = { id: nodeId, direct, transitive, epicImpact, animStart: performance.now() };
    // Update info badge
    const badge = document.getElementById('flow-info-badge');
    if (badge) {
      const total = direct.size + transitive.size;
      let html = `<strong>What-If: Close ${esc(nodeId)}</strong><br>`;
      html += total > 0 ? `Unblocks <strong>${direct.size}</strong> direct + <strong>${transitive.size}</strong> transitive` : 'No cascading unblocks';
      if (epicImpact.length) {
        html += '<div class="epic-impact">';
        epicImpact.forEach(e => { html += `${esc(e.name)}: ${e.from}% → ${e.to}% (+${e.delta})<br>`; });
        html += '</div>';
      }
      badge.innerHTML = html;
      badge.classList.add('visible');
    }
  }

  clearWhatIf() {
    this.whatIf = null;
    const badge = document.getElementById('flow-info-badge');
    if (badge) badge.classList.remove('visible');
  }

  slackColor(slack) {
    const maxS = metrics.maxSlack || 1;
    const t = Math.min(slack / maxS, 1);
    if (t < 0.01) return '#ef4444'; // red — critical path
    if (t < 0.25) return '#f97316'; // orange
    if (t < 0.5) return '#eab308'; // yellow
    if (t < 0.75) return '#22c55e'; // green
    return '#06b6d4'; // teal — max flexibility
  }

  draw() {
    const ctx = this.ctx;
    ctx.save();
    ctx.clearRect(0, 0, this.w, this.h);
    ctx.translate(this.ox, this.oy);
    ctx.scale(this.scale, this.scale);
    const isDark = document.documentElement.dataset.theme !== 'light';

    // Wave column bands
    this.waveList.forEach(w => {
      const stats = this.waveStats[w];
      if (!this.showClosed && stats.closed === stats.total) return;
      const x = this.padX + w * this.colW;
      ctx.fillStyle = w % 2 === 0 ? (isDark ? 'rgba(255,255,255,0.015)' : 'rgba(0,0,0,0.018)') : 'transparent';
      ctx.fillRect(x, this.padY, this.colW, this.contentH - this.padY);

      // Header
      ctx.font = '700 13px "Syne"';
      ctx.textAlign = 'center';
      ctx.fillStyle = isDark ? 'rgba(255,255,255,0.3)' : 'rgba(0,0,0,0.35)';
      ctx.fillText('Wave ' + w, x + this.colW / 2, this.padY + 16);
      ctx.font = '400 10px "JetBrains Mono"';
      ctx.fillStyle = isDark ? 'rgba(255,255,255,0.18)' : 'rgba(0,0,0,0.22)';
      ctx.fillText(stats.closed + '/' + stats.total, x + this.colW / 2, this.padY + 32);
    });

    // NOW frontier
    if (this.nowWave >= 0) {
      const nx = this.padX + (this.nowWave + 1) * this.colW;
      ctx.save();
      ctx.beginPath();
      ctx.moveTo(nx, this.padY - 20);
      ctx.lineTo(nx, this.contentH);
      ctx.strokeStyle = isDark ? 'rgba(99,102,241,0.35)' : 'rgba(79,70,229,0.25)';
      ctx.lineWidth = 2;
      ctx.setLineDash([6, 4]);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.font = '700 10px "Syne"';
      ctx.fillStyle = isDark ? 'rgba(99,102,241,0.7)' : 'rgba(79,70,229,0.6)';
      ctx.textAlign = 'center';
      ctx.fillText('NOW', nx, this.padY - 6);
      ctx.restore();
    }

    // Hover neighborhood
    const hoverSet = new Set();
    if (this.hover) {
      hoverSet.add(this.hover.id);
      this.edges.forEach(e => {
        if (e.from === this.hover.id) hoverSet.add(e.to);
        if (e.to === this.hover.id) hoverSet.add(e.from);
      });
    }

    // Edges
    this.edges.forEach(e => {
      const s = this.nodeMap[e.from], t = this.nodeMap[e.to];
      if (!s || !t) return;
      if (!this.showClosed && (s.status === 'closed' || t.status === 'closed')) return;
      const dimmed = this.hover && !hoverSet.has(e.from) && !hoverSet.has(e.to);
      const sx = s.x + s.w, sy = s.y + s.h / 2;
      const tx = t.x, ty = t.y + t.h / 2;
      const dx = Math.abs(tx - sx) * 0.45;

      ctx.beginPath();
      ctx.moveTo(sx, sy);
      ctx.bezierCurveTo(sx + dx, sy, tx - dx, ty, tx, ty);
      if (e.critical) {
        ctx.strokeStyle = dimmed ? 'rgba(239,68,68,0.06)' : 'rgba(239,68,68,0.5)';
        ctx.lineWidth = 2.5;
      } else {
        ctx.strokeStyle = dimmed ? 'rgba(113,113,122,0.04)' : (isDark ? 'rgba(113,113,122,0.18)' : 'rgba(113,113,122,0.22)');
        ctx.lineWidth = 1;
      }
      ctx.stroke();

      // Arrowhead
      if (!dimmed) {
        const aLen = 6;
        ctx.beginPath();
        ctx.moveTo(tx, ty);
        ctx.lineTo(tx - aLen, ty - aLen * 0.45);
        ctx.moveTo(tx, ty);
        ctx.lineTo(tx - aLen, ty + aLen * 0.45);
        ctx.stroke();
      }
    });

    // Particles on critical path edges
    if (this.running) {
      this.edges.filter(e => e.critical).forEach(e => {
        const s = this.nodeMap[e.from], t = this.nodeMap[e.to];
        if (!s || !t) return;
        if (!this.showClosed && (s.status === 'closed' || t.status === 'closed')) return;
        if (this.hover && !hoverSet.has(e.from) && !hoverSet.has(e.to)) return;
        const sx = s.x + s.w, sy = s.y + s.h / 2;
        const tx = t.x, ty = t.y + t.h / 2;
        const dx = Math.abs(tx - sx) * 0.45;
        for (let p = 0; p < 3; p++) {
          const tt = ((this.animT * 0.3 + p * 0.33) % 1);
          const mt = 1 - tt;
          const px = mt*mt*mt*sx + 3*mt*mt*tt*(sx+dx) + 3*mt*tt*tt*(tx-dx) + tt*tt*tt*tx;
          const py = mt*mt*mt*sy + 3*mt*mt*tt*sy + 3*mt*tt*tt*ty + tt*tt*tt*ty;
          ctx.beginPath();
          ctx.arc(px, py, 2.5, 0, Math.PI * 2);
          ctx.fillStyle = 'rgba(239,68,68,' + (0.7 * (1 - tt * 0.5)).toFixed(2) + ')';
          ctx.fill();
        }
      });
    }

    // What-If highlight sets
    const wiDirect = this.whatIf?.direct || new Set();
    const wiTransitive = this.whatIf?.transitive || new Set();
    const wiAll = new Set([...wiDirect, ...wiTransitive]);
    const wiActive = !!this.whatIf;
    const wiElapsed = wiActive ? (performance.now() - this.whatIf.animStart) / 1000 : 0;

    // Nodes
    const statusColors = { closed: '#22c55e', in_progress: '#f59e0b', blocked: '#ef4444', open: '#6366f1' };
    const priColors = ['#ef4444', '#f97316', '#eab308', '#3b82f6', '#52525b'];
    const bgColors = isDark
      ? { closed: '#111814', in_progress: '#191710', blocked: '#191111', open: '#111119' }
      : { closed: '#f0f9f0', in_progress: '#fef9ec', blocked: '#fef2f2', open: '#eef2ff' };
    const icons = { closed: '\u2713', in_progress: '\u25CF', blocked: '\u25C6', open: '\u25CB' };

    // Epic group headers (drawn once per wave per epic group in epic mode)
    if (this.colorMode === 'epic') {
      const drawnEpicHeaders = new Set();
      this.nodes.forEach(n => {
        if (!this.showClosed && n.status === 'closed') return;
        if (!n.epicId) return;
        const key = n.wave + ':' + n.epicId;
        if (drawnEpicHeaders.has(key)) return;
        drawnEpicHeaders.add(key);
        const color = this.epicColors[n.epicId] || '#71717a';
        const epic = issueMap[n.epicId];
        const label = epic ? (epic.title.length > 25 ? epic.title.slice(0, 23) + '..' : epic.title) : n.epicId;
        // Subtle band behind epic group
        ctx.fillStyle = color + '08';
        const groupNodes = this.nodes.filter(gn => gn.wave === n.wave && gn.epicId === n.epicId && (this.showClosed || gn.status !== 'closed'));
        if (groupNodes.length) {
          const gMinY = Math.min(...groupNodes.map(g => g.y)) - 4;
          const gMaxY = Math.max(...groupNodes.map(g => g.y + g.h)) + 4;
          ctx.fillRect(n.x - 6, gMinY, n.w + 12, gMaxY - gMinY);
          // Epic label above group
          ctx.font = '600 8px "Syne"';
          ctx.fillStyle = color + 'aa';
          ctx.textAlign = 'left';
          ctx.fillText(label, n.x, gMinY - 4);
        }
      });
    }

    this.nodes.forEach(n => {
      if (!this.showClosed && n.status === 'closed') return;
      const dimmed = this.hover && !hoverSet.has(n.id);
      const wiNode = wiActive && (n.id === this.whatIf.id);
      const wiUnblocked = wiActive && wiAll.has(n.id);
      const wiDimmed = wiActive && !wiNode && !wiUnblocked && n.status !== 'closed';
      ctx.globalAlpha = dimmed ? 0.15 : wiDimmed ? 0.25 : 1;
      const { x, y, w, h, status, issue, critical, ready, epicId, isArticulation, slack: nodeSlack } = n;

      // Determine left bar color based on mode
      let barColor = statusColors[status] || '#71717a';
      if (this.colorMode === 'slack' && status !== 'closed') barColor = this.slackColor(nodeSlack);
      else if (this.colorMode === 'epic' && epicId) barColor = this.epicColors[epicId] || '#71717a';

      // Background
      ctx.beginPath();
      this.roundRect(x, y, w, h, 7);
      if (this.colorMode === 'epic' && epicId && status !== 'closed') {
        const ec = this.epicColors[epicId] || '#71717a';
        ctx.fillStyle = ec + (isDark ? '18' : '12');
      } else {
        ctx.fillStyle = bgColors[status] || (isDark ? '#1a1a1e' : '#f5f5f7');
      }
      ctx.fill();

      // What-If glow for simulated node
      if (wiNode && !dimmed) {
        ctx.save();
        const pulse = Math.sin(wiElapsed * 4) * 0.2 + 0.6;
        ctx.shadowColor = `rgba(34,197,94,${pulse.toFixed(2)})`;
        ctx.shadowBlur = 16;
        ctx.beginPath();
        this.roundRect(x, y, w, h, 7);
        ctx.strokeStyle = `rgba(34,197,94,0.8)`;
        ctx.lineWidth = 2;
        ctx.stroke();
        ctx.restore();
      }

      // What-If glow for unblocked nodes (animate in with delay)
      if (wiUnblocked && !dimmed) {
        const isDirect = wiDirect.has(n.id);
        const delay = isDirect ? 0.2 : 0.6;
        const intensity = clamp((wiElapsed - delay) * 3, 0, 1);
        if (intensity > 0) {
          ctx.save();
          ctx.shadowColor = `rgba(34,197,94,${(intensity * 0.4).toFixed(2)})`;
          ctx.shadowBlur = 10;
          ctx.beginPath();
          this.roundRect(x, y, w, h, 7);
          ctx.strokeStyle = `rgba(34,197,94,${(intensity * 0.7).toFixed(2)})`;
          ctx.lineWidth = 1.5;
          ctx.stroke();
          ctx.restore();
        }
      }

      // Ready node glow (only in status mode)
      if (ready && !dimmed && !wiActive && this.colorMode === 'status') {
        ctx.save();
        ctx.shadowColor = 'rgba(99,102,241,0.4)';
        ctx.shadowBlur = 12 + Math.sin(this.animT * Math.PI * 2) * 4;
        ctx.beginPath();
        this.roundRect(x, y, w, h, 7);
        ctx.strokeStyle = 'rgba(99,102,241,0.6)';
        ctx.lineWidth = 1.5;
        ctx.stroke();
        ctx.restore();
      }

      // Critical path glow (only in status mode)
      if (critical && !ready && !dimmed && !wiActive && this.colorMode === 'status') {
        ctx.save();
        ctx.shadowColor = 'rgba(239,68,68,0.3)';
        ctx.shadowBlur = 8;
        ctx.beginPath();
        this.roundRect(x, y, w, h, 7);
        ctx.strokeStyle = 'rgba(239,68,68,0.4)';
        ctx.lineWidth = 1.5;
        ctx.stroke();
        ctx.restore();
      }

      // Left status bar
      ctx.beginPath();
      ctx.moveTo(x, y + 7);
      ctx.arcTo(x, y, x + 7, y, 7);
      ctx.lineTo(x + 4, y);
      ctx.lineTo(x + 4, y + h);
      ctx.lineTo(x, y + h - 7);
      ctx.arcTo(x, y + h, x, y + h - 7, 7);
      ctx.closePath();
      ctx.fillStyle = barColor;
      ctx.fill();

      // Border
      ctx.beginPath();
      this.roundRect(x, y, w, h, 7);
      ctx.strokeStyle = this.hover === n
        ? (isDark ? 'rgba(255,255,255,0.6)' : 'rgba(0,0,0,0.4)')
        : (isDark ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.08)');
      ctx.lineWidth = this.hover === n ? 1.5 : 0.5;
      ctx.stroke();

      // Title
      if (this.showLabels || this.hover === n) {
        ctx.font = '500 ' + (status === 'closed' ? '11.5' : '13') + 'px "DM Sans"';
        ctx.fillStyle = status === 'closed'
          ? (isDark ? 'rgba(255,255,255,0.4)' : 'rgba(0,0,0,0.35)')
          : (isDark ? '#ededef' : '#18181b');
        ctx.textAlign = 'left';
        const maxTW = w - 24;
        let title = issue.title || '';
        while (ctx.measureText(title).width > maxTW && title.length > 5) title = title.slice(0, -4) + '..';
        ctx.fillText(title, x + 14, y + 25);
      }

      // Type badge + slack value in slack mode
      ctx.font = '500 9px "DM Sans"';
      ctx.fillStyle = isDark ? 'rgba(255,255,255,0.2)' : 'rgba(0,0,0,0.2)';
      ctx.textAlign = 'left';
      let typeText = issue.issue_type || 'task';
      if (this.colorMode === 'slack' && status !== 'closed') typeText += ' · slack ' + nodeSlack;
      ctx.fillText(typeText, x + 14, y + 40);

      // ID
      ctx.font = '9px "JetBrains Mono"';
      ctx.fillStyle = isDark ? 'rgba(255,255,255,0.25)' : 'rgba(0,0,0,0.25)';
      ctx.textAlign = 'left';
      ctx.fillText(issue.id, x + 14, y + h - 10);

      // Priority
      ctx.font = '600 9px "JetBrains Mono"';
      ctx.fillStyle = priColors[issue.priority ?? 2];
      ctx.textAlign = 'right';
      ctx.fillText('P' + (issue.priority ?? 2), x + w - 12, y + h - 10);

      // Status icon
      ctx.font = '13px system-ui';
      ctx.textAlign = 'right';
      ctx.fillStyle = statusColors[status];
      ctx.fillText(icons[status] || '\u25CB', x + w - 12, y + 22);

      // Articulation point warning
      if (isArticulation && status !== 'closed' && !dimmed) {
        ctx.font = '12px system-ui';
        ctx.textAlign = 'right';
        ctx.fillStyle = '#f59e0b';
        ctx.fillText('\u26A0', x + w - 28, y + 22);
      }

      // Strikethrough for closed
      if (status === 'closed' && this.showLabels) {
        ctx.beginPath();
        ctx.moveTo(x + 14, y + 22);
        ctx.lineTo(x + w - 28, y + 22);
        ctx.strokeStyle = isDark ? 'rgba(255,255,255,0.15)' : 'rgba(0,0,0,0.12)';
        ctx.lineWidth = 0.5;
        ctx.stroke();
      }

      ctx.globalAlpha = 1;
    });

    // What-If ripple rings
    if (wiActive && this.whatIf) {
      const srcNode = this.nodeMap[this.whatIf.id];
      if (srcNode) {
        const cx = srcNode.x + srcNode.w / 2, cy = srcNode.y + srcNode.h / 2;
        for (let ring = 0; ring < 3; ring++) {
          const delay = ring * 0.3;
          const t = clamp((wiElapsed - delay) * 1.5, 0, 1);
          if (t > 0 && t < 1) {
            const r = 30 + t * 120;
            ctx.beginPath();
            ctx.arc(cx, cy, r, 0, Math.PI * 2);
            ctx.strokeStyle = `rgba(34,197,94,${((1 - t) * 0.3).toFixed(2)})`;
            ctx.lineWidth = 2;
            ctx.stroke();
          }
        }
      }
    }

    ctx.restore();
  }

  animate() {
    if (!this.running) return;
    this.animT = (this.animT + 0.004) % 1;
    this.draw();
    requestAnimationFrame(() => this.animate());
  }

  pause() { this.running = false; }
  resume() { this.running = true; this.animate(); }

  bindEvents() {
    const c = this.canvas;
    c.addEventListener('mousemove', e => {
      const rect = c.getBoundingClientRect();
      const sx = e.clientX - rect.left, sy = e.clientY - rect.top;
      if (this.pan) {
        this.ox = this.pan.ox + (sx - this.pan.sx);
        this.oy = this.pan.oy + (sy - this.pan.sy);
        if (!this.running) this.draw();
        return;
      }
      this.hover = this.nodeAt(sx, sy);
      c.style.cursor = this.whatIfMode ? (this.hover ? 'crosshair' : 'default') : (this.hover ? 'pointer' : 'grab');
      const tip = document.getElementById('flow-tooltip');
      if (this.hover && tip) {
        const i = this.hover.issue;
        const cascade = metrics.cascadeUnblock[i.id] || 0;
        const blockerCount = (adjOut[i.id] || []).filter(d => issueMap[d.to]?.status !== 'closed').length;
        tip.innerHTML = '<strong>' + esc(i.title) + '</strong><br><span style="font-size:0.62rem;color:var(--text-muted)">'
          + esc(i.id) + ' \u00B7 ' + esc(i.issue_type || 'task') + ' \u00B7 ' + pShort(i.priority) + '<br>'
          + 'Wave ' + this.hover.wave + ' \u00B7 ' + (blockerCount > 0 ? blockerCount + ' blocker' + (blockerCount > 1 ? 's' : '') : 'Ready')
          + (cascade > 0 ? ' \u00B7 Close \u2192 ' + cascade + ' unblock' : '')
          + '</span>';
        tip.style.left = (e.clientX - rect.left + 14) + 'px';
        tip.style.top = (e.clientY - rect.top - 10) + 'px';
        tip.classList.add('visible');
      } else if (tip) tip.classList.remove('visible');
      if (!this.running) this.draw();
    });
    c.addEventListener('mousedown', e => {
      const rect = c.getBoundingClientRect();
      const sx = e.clientX - rect.left, sy = e.clientY - rect.top;
      if (this.whatIfMode) {
        const n = this.nodeAt(sx, sy);
        if (n && n.status !== 'closed') { this.simulateWhatIf(n.id); return; }
        else if (!n) { this.clearWhatIf(); }
      }
      this.pan = { sx, sy, ox: this.ox, oy: this.oy };
    });
    c.addEventListener('mouseup', () => { this.pan = null; });
    c.addEventListener('mouseleave', () => {
      this.pan = null; this.hover = null;
      const tip = document.getElementById('flow-tooltip');
      if (tip) tip.classList.remove('visible');
      if (!this.running) this.draw();
    });
    c.addEventListener('dblclick', e => {
      const rect = c.getBoundingClientRect();
      const n = this.nodeAt(e.clientX - rect.left, e.clientY - rect.top);
      if (n) openDrawer(n.id);
    });
    c.addEventListener('wheel', e => {
      e.preventDefault();
      const rect = c.getBoundingClientRect();
      const sx = e.clientX - rect.left, sy = e.clientY - rect.top;
      const old = this.scale;
      this.scale *= e.deltaY > 0 ? 0.92 : 1.08;
      this.scale = clamp(this.scale, 0.15, 3);
      this.ox = sx - (sx - this.ox) * (this.scale / old);
      this.oy = sy - (sy - this.oy) * (this.scale / old);
      if (!this.running) this.draw();
    }, { passive: false });
    window.addEventListener('resize', () => { this.resize(); if (!this.running) this.draw(); });
  }
}

let flowGraph = null;

function initFlowGraph() {
  const canvas = document.getElementById('flow-canvas');
  if (!canvas) return;
  flowGraph = new FlowGraph(canvas);
  document.getElementById('flow-fit')?.addEventListener('click', () => { flowGraph.fitToView(); if (!flowGraph.running) flowGraph.draw(); });
  document.getElementById('flow-labels')?.addEventListener('click', function() {
    flowGraph.showLabels = !flowGraph.showLabels;
    this.classList.toggle('active');
    if (!flowGraph.running) flowGraph.draw();
  });
  document.getElementById('flow-closed')?.addEventListener('click', function() {
    flowGraph.showClosed = !flowGraph.showClosed;
    this.classList.toggle('active');
    flowGraph.fitToView();
    if (!flowGraph.running) flowGraph.draw();
  });

  // Color mode buttons
  const modeBtns = ['flow-mode-status', 'flow-mode-slack', 'flow-mode-epic'];
  const modeMap = { 'flow-mode-status': 'status', 'flow-mode-slack': 'slack', 'flow-mode-epic': 'epic' };
  modeBtns.forEach(btnId => {
    document.getElementById(btnId)?.addEventListener('click', function() {
      modeBtns.forEach(id => document.getElementById(id)?.classList.remove('active'));
      this.classList.add('active');
      flowGraph.colorMode = modeMap[btnId];
      // Update legend
      updateFlowLegend(flowGraph.colorMode);
      if (!flowGraph.running) flowGraph.draw();
    });
  });

  // What-If toggle
  document.getElementById('flow-whatif')?.addEventListener('click', function() {
    flowGraph.whatIfMode = !flowGraph.whatIfMode;
    this.classList.toggle('active');
    if (!flowGraph.whatIfMode) flowGraph.clearWhatIf();
    if (!flowGraph.running) flowGraph.draw();
  });
}

function updateFlowLegend(mode) {
  const legend = document.getElementById('flow-legend');
  if (!legend) return;
  if (mode === 'slack') {
    legend.innerHTML = `
      <div class="flow-legend-item"><div class="flow-legend-dot" style="background:#ef4444"></div>Slack 0 (critical)</div>
      <div class="flow-legend-item"><div class="flow-legend-dot" style="background:#f97316"></div>Low slack</div>
      <div class="flow-legend-item"><div class="flow-legend-dot" style="background:#eab308"></div>Medium</div>
      <div class="flow-legend-item"><div class="flow-legend-dot" style="background:#22c55e"></div>High slack</div>
      <div class="flow-legend-item"><div class="flow-legend-dot" style="background:#06b6d4"></div>Max flexibility</div>
      <div class="flow-legend-item"><span style="font-size:0.8rem">\u26A0</span> Bridge Node</div>`;
  } else if (mode === 'epic') {
    let html = '';
    const epics = ISSUES.filter(i => i.issue_type === 'epic').sort((a, b) => (a.priority ?? 2) - (b.priority ?? 2));
    const EPIC_HUES = ['#8b5cf6','#f59e0b','#06b6d4','#ec4899','#10b981','#f97316','#6366f1','#14b8a6','#e11d48','#84cc16'];
    epics.forEach((e, i) => {
      const color = EPIC_HUES[i % EPIC_HUES.length];
      const name = e.title.length > 18 ? e.title.slice(0, 16) + '..' : e.title;
      html += `<div class="flow-legend-item"><div class="flow-legend-dot" style="background:${color}"></div>${esc(name)}</div>`;
    });
    html += `<div class="flow-legend-item"><div class="flow-legend-dot" style="background:#71717a"></div>No epic</div>`;
    legend.innerHTML = html;
  } else {
    legend.innerHTML = `
      <div class="flow-legend-item"><div class="flow-legend-dot" style="background:var(--status-open)"></div>Ready</div>
      <div class="flow-legend-item"><div class="flow-legend-dot" style="background:var(--status-wip)"></div>In Progress</div>
      <div class="flow-legend-item"><div class="flow-legend-dot" style="background:var(--status-blocked)"></div>Blocked</div>
      <div class="flow-legend-item"><div class="flow-legend-dot" style="background:var(--status-closed)"></div>Closed</div>
      <div class="flow-legend-item"><span style="color:var(--status-blocked);font-weight:600;font-size:0.8rem">\u2014</span> Critical Path</div>
      <div class="flow-legend-item"><span style="font-size:0.8rem">\u26A0</span> Bridge Node</div>`;
  }
}

// ─── Detail Drawer ───────────────────────────────────────────────────────────
function openDrawer(issueId) {
  const i = issueMap[issueId];
  if (!i) return;
  const es = effectiveStatus(i);
  const age = daysAgo(i.created_at);
  const m = metrics;

  let hd = `<button class="drawer-close" id="drawer-close-btn">&times;</button>
    <div class="drawer-hd-info">
      <div class="drawer-title">${esc(i.title)}</div>
      <div class="drawer-meta-row">
        <span class="pri-badge p${i.priority ?? 2}">${pShort(i.priority)}</span>
        <span class="status-badge ${es}">${statusLabel(es)}</span>
        <span class="type-badge ${esc(i.issue_type || 'task')}">${esc(i.issue_type || 'task')}</span>
        <span class="tag">${esc(i.id)}</span>
        <span class="age">${age > 0 ? age + 'd old' : 'today'}</span>
      </div>
    </div>`;

  let body = '';
  // Description
  if (i.description) {
    body += `<div class="drawer-section"><div class="drawer-section-title">Description</div><div class="drawer-desc">${esc(i.description)}</div></div>`;
  }

  // Dependencies: what blocks this
  const blockers = (adjOut[i.id] || []).map(d => issueMap[d.to]).filter(Boolean);
  if (blockers.length) {
    body += `<div class="drawer-section"><div class="drawer-section-title">Blocked By (${blockers.length})</div>`;
    blockers.forEach(b => {
      const bs = effectiveStatus(b);
      const dotColor = bs === 'closed' ? 'var(--status-closed)' : bs === 'in_progress' ? 'var(--status-wip)' : bs === 'blocked' ? 'var(--status-blocked)' : 'var(--status-open)';
      body += `<div class="drawer-dep-item"><div class="drawer-dep-status" style="background:${dotColor}"></div><span class="drawer-dep-id">${esc(b.id)}</span><span class="drawer-dep-title">${esc(b.title)}</span></div>`;
    });
    body += '</div>';
  }

  // What this blocks
  const blocking = (adjIn[i.id] || []).map(d => issueMap[d.from]).filter(Boolean);
  if (blocking.length) {
    body += `<div class="drawer-section"><div class="drawer-section-title">Blocks (${blocking.length})</div>`;
    blocking.forEach(b => {
      const bs = effectiveStatus(b);
      const dotColor = bs === 'closed' ? 'var(--status-closed)' : bs === 'in_progress' ? 'var(--status-wip)' : bs === 'blocked' ? 'var(--status-blocked)' : 'var(--status-open)';
      body += `<div class="drawer-dep-item"><div class="drawer-dep-status" style="background:${dotColor}"></div><span class="drawer-dep-id">${esc(b.id)}</span><span class="drawer-dep-title">${esc(b.title)}</span></div>`;
    });
    body += '</div>';
  }

  // Parent
  if (parentOf[i.id]) {
    const parent = issueMap[parentOf[i.id]];
    if (parent) {
      body += `<div class="drawer-section"><div class="drawer-section-title">Parent Epic</div><div class="drawer-dep-item"><span class="drawer-dep-id">${esc(parent.id)}</span><span class="drawer-dep-title">${esc(parent.title)}</span></div></div>`;
    }
  }

  // Comments
  const comments = i.comments || [];
  if (comments.length) {
    body += `<div class="drawer-section"><div class="drawer-section-title">Comments (${comments.length})</div>`;
    comments.forEach(c => {
      const cDate = c.created_at ? new Date(c.created_at).toLocaleDateString() : '';
      const cAuthor = c.author || c.created_by || '';
      body += `<div class="drawer-comment">
        <div class="drawer-comment-meta">${esc(cAuthor)}${cAuthor && cDate ? ' · ' : ''}${esc(cDate)}</div>
        <div class="drawer-comment-body">${esc(c.body || c.text || c.content || '')}</div>
      </div>`;
    });
    body += '</div>';
  }

  // Metrics
  const cascade = m.cascadeUnblock[i.id] || 0;
  const chain = m.chainDepth[i.id] || 0;
  body += `<div class="drawer-section"><div class="drawer-section-title">Metrics</div>
    <div class="drawer-metric-row"><span class="drawer-metric-label">Impact Score</span><span class="drawer-metric-val">${((m.impact[i.id] || 0) * 100).toFixed(0)}%</span></div>
    <div class="drawer-metric-row"><span class="drawer-metric-label">PageRank</span><span class="drawer-metric-val">${(m.pr[i.id] || 0).toFixed(4)}</span></div>
    <div class="drawer-metric-row"><span class="drawer-metric-label">Blocked by</span><span class="drawer-metric-val">${m.inDeg[i.id] || 0}${chain > 0 ? ` (chain depth: ${chain})` : ''}</span></div>
    <div class="drawer-metric-row"><span class="drawer-metric-label">Blocks</span><span class="drawer-metric-val">${m.outDeg[i.id] || 0}${cascade > 0 ? ` (close → ${cascade} unblock)` : ''}</span></div>
    <div class="drawer-metric-row"><span class="drawer-metric-label">On critical path</span><span class="drawer-metric-val">${m.cpSet?.has(i.id) ? 'Yes' : 'No'}</span></div>
  </div>`;

  document.getElementById('drawer-hd').innerHTML = hd;
  document.getElementById('drawer-body').innerHTML = body;
  document.getElementById('drawer').classList.add('open');
  document.getElementById('drawer-close-btn')?.addEventListener('click', closeDrawer);
  // Deep-link
  history.replaceState(null, '', '#issue/' + issueId);

  // Bind clickable dep items in drawer to open their issues
  document.querySelectorAll('.drawer-dep-item').forEach(el => {
    const depId = el.querySelector('.drawer-dep-id')?.textContent;
    if (depId && issueMap[norm(depId)]) {
      el.style.cursor = 'pointer';
      el.addEventListener('click', () => openDrawer(norm(depId)));
    }
  });
}

function closeDrawer() {
  document.getElementById('drawer').classList.remove('open');
  history.replaceState(null, '', '#' + STATE.view);
}

// ─── Navigation ──────────────────────────────────────────────────────────────
function navigateTo(view) {
  STATE.view = view;
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.toggle('active', t.dataset.view === view));
  document.querySelectorAll('.view').forEach(v => v.classList.toggle('active', v.id === 'view-' + view));
  if (view === 'graph') {
    if (!forceGraph) initForceGraph();
    else { forceGraph.resize(); forceGraph.resume(); }
  } else if (forceGraph) forceGraph.pause();
  if (view === 'flow') {
    if (!flowGraph) initFlowGraph();
    else { flowGraph.resize(); flowGraph.resume(); }
  } else if (flowGraph) flowGraph.pause();
  if (view === 'issues') refreshIssuesTable();
  window.location.hash = view;
}

function parseHash() {
  const h = window.location.hash.slice(1) || 'dashboard';
  // Deep-link: #issue/winzy.ai-xxx opens the issue drawer
  if (h.startsWith('issue/')) {
    const id = norm(h.slice(6));
    if (issueMap[id]) {
      navigateTo('issues');
      setTimeout(() => openDrawer(id), 100);
      return;
    }
  }
  const valid = ['dashboard', 'issues', 'graph', 'epics', 'insights', 'flow', 'forecast'];
  navigateTo(valid.includes(h) ? h : 'dashboard');
}

// ─── Theme ───────────────────────────────────────────────────────────────────
function initTheme() {
  const saved = localStorage.getItem('beadspace-theme');
  if (saved) document.documentElement.dataset.theme = saved;
  const btn = document.getElementById('theme-btn');
  const update = () => { btn.innerHTML = document.documentElement.dataset.theme === 'dark' ? '&#9788;' : '&#9790;'; };
  update();
  btn.addEventListener('click', () => {
    const next = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark';
    document.documentElement.dataset.theme = next;
    localStorage.setItem('beadspace-theme', next);
    update();
  });
}

// ─── Keyboard Shortcuts ──────────────────────────────────────────────────────
function getVisibleRows() {
  return Array.from(document.querySelectorAll('#issues-tbody tr'));
}

function selectRow(idx) {
  const rows = getVisibleRows();
  rows.forEach(r => r.classList.remove('selected'));
  if (idx >= 0 && idx < rows.length) {
    STATE.selectedIdx = idx;
    rows[idx].classList.add('selected');
    rows[idx].scrollIntoView({ block: 'nearest' });
  }
}

function initKeyboard() {
  document.addEventListener('keydown', e => {
    // Cmd+K / Ctrl+K — quick jump palette (works even in inputs)
    if (e.key === 'k' && (e.metaKey || e.ctrlKey)) {
      e.preventDefault();
      openPalette();
      return;
    }

    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') {
      if (e.key === 'Escape') e.target.blur();
      return;
    }

    const views = ['dashboard', 'issues', 'graph', 'epics', 'insights', 'flow', 'forecast'];
    if (e.key >= '1' && e.key <= '7') { navigateTo(views[+e.key - 1]); return; }
    if (e.key === '/') { e.preventDefault(); navigateTo('issues'); setTimeout(() => document.getElementById('search')?.focus(), 50); return; }
    if (e.key === 'Escape') {
      closePalette();
      closeDrawer();
      document.getElementById('kbd-overlay').classList.remove('open');
      return;
    }
    // j/k navigation (issues table view)
    if (e.key === 'j' && STATE.view === 'issues') {
      const rows = getVisibleRows();
      if (!rows.length) return;
      const next = STATE.selectedIdx < rows.length - 1 ? STATE.selectedIdx + 1 : 0;
      selectRow(next);
      return;
    }
    if (e.key === 'k' && STATE.view === 'issues') {
      const rows = getVisibleRows();
      if (!rows.length) return;
      const prev = STATE.selectedIdx <= 0 ? rows.length - 1 : STATE.selectedIdx - 1;
      selectRow(prev);
      return;
    }
    // Enter — open selected issue
    if (e.key === 'Enter' && STATE.view === 'issues') {
      const rows = getVisibleRows();
      if (STATE.selectedIdx >= 0 && STATE.selectedIdx < rows.length) {
        const id = rows[STATE.selectedIdx].dataset.id;
        if (id) openDrawer(id);
      }
      return;
    }
    if (e.key === 't') {
      const next = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark';
      document.documentElement.dataset.theme = next;
      localStorage.setItem('beadspace-theme', next);
      document.getElementById('theme-btn').innerHTML = next === 'dark' ? '&#9788;' : '&#9790;';
      return;
    }
    if (e.key === '?') { document.getElementById('kbd-overlay').classList.toggle('open'); return; }
    if (e.key === 'f') {
      if (STATE.view === 'graph' && forceGraph) { forceGraph.fitToView(); return; }
      if (STATE.view === 'flow' && flowGraph) { flowGraph.fitToView(); if (!flowGraph.running) flowGraph.draw(); return; }
    }
    if (e.key === 'l') {
      if (STATE.view === 'graph' && forceGraph) {
        forceGraph.showLabels = !forceGraph.showLabels;
        document.getElementById('graph-labels')?.classList.toggle('active');
        if (!forceGraph.running) forceGraph.draw();
      }
      if (STATE.view === 'flow' && flowGraph) {
        flowGraph.showLabels = !flowGraph.showLabels;
        document.getElementById('flow-labels')?.classList.toggle('active');
        if (!flowGraph.running) flowGraph.draw();
      }
    }
  });
}

// ─── Cmd+K Palette ───────────────────────────────────────────────────────────
let paletteIdx = 0;
let paletteFiltered = [];

function openPalette() {
  const palette = document.getElementById('palette');
  const input = document.getElementById('palette-input');
  palette.classList.add('open');
  input.value = '';
  paletteIdx = 0;
  paletteFiltered = ISSUES.slice().sort((a, b) => (metrics.impact[b.id] || 0) - (metrics.impact[a.id] || 0));
  renderPaletteResults();
  setTimeout(() => input.focus(), 50);
}

function closePalette() {
  document.getElementById('palette').classList.remove('open');
}

function renderPaletteResults() {
  const container = document.getElementById('palette-results');
  if (!paletteFiltered.length) {
    container.innerHTML = '<div class="palette-empty">No matching issues</div>';
    return;
  }
  const shown = paletteFiltered.slice(0, 20);
  container.innerHTML = shown.map((i, idx) => {
    const es = effectiveStatus(i);
    return `<div class="palette-item${idx === paletteIdx ? ' active' : ''}" data-id="${esc(i.id)}">
      <span class="palette-item-id">${esc(i.id)}</span>
      <span class="palette-item-title">${esc(i.title)}</span>
      <span class="palette-item-type">${esc(i.issue_type || 'task')} · ${statusLabel(es)}</span>
    </div>`;
  }).join('');
  // Bind clicks
  container.querySelectorAll('.palette-item').forEach(el => {
    el.addEventListener('click', () => { closePalette(); openDrawer(el.dataset.id); });
  });
}

function initPalette() {
  const input = document.getElementById('palette-input');
  const backdrop = document.getElementById('palette-backdrop');

  input?.addEventListener('input', e => {
    const q = e.target.value.toLowerCase().trim();
    paletteIdx = 0;
    if (!q) {
      paletteFiltered = ISSUES.slice().sort((a, b) => (metrics.impact[b.id] || 0) - (metrics.impact[a.id] || 0));
    } else {
      paletteFiltered = ISSUES.filter(i =>
        i.id.includes(q) || (i.title || '').toLowerCase().includes(q) || (i.description || '').toLowerCase().includes(q)
      ).sort((a, b) => {
        // Prioritize ID matches, then title matches
        const aId = a.id.includes(q) ? 0 : 1;
        const bId = b.id.includes(q) ? 0 : 1;
        if (aId !== bId) return aId - bId;
        return (metrics.impact[b.id] || 0) - (metrics.impact[a.id] || 0);
      });
    }
    renderPaletteResults();
  });

  input?.addEventListener('keydown', e => {
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      paletteIdx = Math.min(paletteIdx + 1, Math.min(paletteFiltered.length - 1, 19));
      renderPaletteResults();
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      paletteIdx = Math.max(paletteIdx - 1, 0);
      renderPaletteResults();
    } else if (e.key === 'Enter') {
      e.preventDefault();
      if (paletteFiltered[paletteIdx]) {
        closePalette();
        openDrawer(paletteFiltered[paletteIdx].id);
      }
    } else if (e.key === 'Escape') {
      closePalette();
    }
  });

  backdrop?.addEventListener('click', closePalette);
}

// ─── Animate In ──────────────────────────────────────────────────────────────
function animateIn() {
  // Stat counters
  document.querySelectorAll('.stat-val[data-count]').forEach(el => {
    animateValue(el, parseInt(el.dataset.count));
  });
  // Bar fills
  setTimeout(() => {
    document.querySelectorAll('.bar-fill[data-w],.epic-mini-fill[data-w],.epic-bar-fill[data-w]').forEach(el => {
      el.style.width = el.dataset.w;
    });
  }, 100);
  // SVG donut segments
  setTimeout(() => {
    document.querySelectorAll('.donut-seg').forEach(seg => {
      const len = parseFloat(seg.dataset.len);
      const C = 2 * Math.PI * 40;
      seg.setAttribute('stroke-dasharray', `${len} ${C}`);
    });
  }, 200);
}

// ─── Bootstrap ───────────────────────────────────────────────────────────────
async function init() {
  try {
    await loadData();
    buildGraph();
    computeMetrics();

    const repoName = window.location.pathname.split('/').filter(Boolean)[0] || 'Beadspace';
    document.getElementById('brand-name').textContent = repoName;
    document.title = repoName;
    document.getElementById('topbar-meta').textContent = ISSUES.length + ' issues';

    const app = document.getElementById('app');
    app.innerHTML = '';
    app.insertAdjacentHTML('beforeend', renderDashboard());
    app.insertAdjacentHTML('beforeend', renderIssuesView());
    app.insertAdjacentHTML('beforeend', renderGraphView());
    app.insertAdjacentHTML('beforeend', renderEpicsView());
    app.insertAdjacentHTML('beforeend', renderInsightsView());
    app.insertAdjacentHTML('beforeend', renderFlowView());
    app.insertAdjacentHTML('beforeend', renderForecastView());

    // Bind nav tabs
    document.querySelectorAll('.nav-tab').forEach(tab => {
      tab.addEventListener('click', () => navigateTo(tab.dataset.view));
    });

    // Bind issue filters
    document.querySelectorAll('.filter-chip').forEach(chip => {
      chip.addEventListener('click', function() {
        document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
        this.classList.add('active');
        STATE.filter = this.dataset.filter;
        refreshIssuesTable();
      });
    });

    // Bind search
    document.getElementById('search')?.addEventListener('input', e => {
      STATE.search = e.target.value;
      refreshIssuesTable();
    });

    // Bind table sort
    document.querySelectorAll('.issues-table th[data-sort]').forEach(th => {
      th.addEventListener('click', () => {
        const field = th.dataset.sort;
        document.querySelectorAll('.issues-table th').forEach(t => t.classList.remove('sorted', 'desc'));
        if (STATE.sort.field === field) STATE.sort.dir *= -1;
        else STATE.sort = { field, dir: 1 };
        th.classList.add('sorted');
        if (STATE.sort.dir === -1) th.classList.add('desc');
        refreshIssuesTable();
      });
    });

    // Bind issue row clicks (dashboard)
    document.addEventListener('click', e => {
      const row = e.target.closest('.issue-row[data-id]');
      if (row) openDrawer(row.dataset.id);
    });

    // Bind epic toggles
    document.querySelectorAll('.epic-header').forEach(hd => {
      hd.addEventListener('click', () => {
        const id = hd.dataset.epic;
        hd.querySelector('.epic-toggle').classList.toggle('open');
        document.querySelector(`.epic-children[data-children="${id}"]`)?.classList.toggle('open');
      });
    });

    // Bind epic child clicks
    document.querySelectorAll('.epic-child[data-id]').forEach(el => {
      el.addEventListener('click', e => { e.stopPropagation(); openDrawer(el.dataset.id); });
    });

    // Bind stat card navigation
    document.querySelectorAll('.stat-card[data-nav]').forEach(card => {
      card.addEventListener('click', () => {
        STATE.filter = card.dataset.nav;
        document.querySelectorAll('.filter-chip').forEach(c => c.classList.toggle('active', c.dataset.filter === STATE.filter));
        navigateTo('issues');
      });
    });

    // Bind drawer backdrop
    document.getElementById('drawer-backdrop')?.addEventListener('click', closeDrawer);

    // Bind kbd overlay backdrop
    document.getElementById('kbd-overlay')?.addEventListener('click', e => {
      if (e.target === e.currentTarget) e.currentTarget.classList.remove('open');
    });

    // ForceGraph is initialized lazily on first graph tab visit (needs visible canvas for sizing)
    initTheme();
    initKeyboard();
    initPalette();
    window.addEventListener('hashchange', parseHash);
    parseHash();
    animateIn();

  } catch (err) {
    document.getElementById('app').innerHTML = `<div class="loading"><div style="color:var(--sev-alert)">Could not load issues</div><div style="font-family:'JetBrains Mono',monospace;font-size:0.72rem;color:var(--text-muted)">${esc(err.message)}</div></div>`;
  }
}

init();
</script>
