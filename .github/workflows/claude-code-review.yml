name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  claude-review:
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Compute PR diff
        id: diff
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          git fetch origin "$BASE_SHA" --depth=1
          CHANGED=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")
          DELIM="GHOUTPUT_$(openssl rand -hex 8)"
          echo "files<<${DELIM}" >> "$GITHUB_OUTPUT"
          echo "$CHANGED" >> "$GITHUB_OUTPUT"
          echo "${DELIM}" >> "$GITHUB_OUTPUT"
          echo "$CHANGED" | grep -q '^services/\|^shared/' && echo "backend=true" >> "$GITHUB_OUTPUT" || echo "backend=false" >> "$GITHUB_OUTPUT"
          echo "$CHANGED" | grep -q '^frontend/' && echo "frontend=true" >> "$GITHUB_OUTPUT" || echo "frontend=false" >> "$GITHUB_OUTPUT"
          echo "$CHANGED" | grep -q '^e2e/' && echo "e2e=true" >> "$GITHUB_OUTPUT" || echo "e2e=false" >> "$GITHUB_OUTPUT"
          # Truncate diff to 128 KB to stay within GitHub output limits and prompt size
          DIFF=$(git diff "$BASE_SHA" "$HEAD_SHA" | head -c 131072)
          DELIM2="GHOUTPUT_$(openssl rand -hex 8)"
          echo "patch<<${DELIM2}" >> "$GITHUB_OUTPUT"
          echo "$DIFF" >> "$GITHUB_OUTPUT"
          echo "${DELIM2}" >> "$GITHUB_OUTPUT"

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          show_full_output: true
          max_turns: 15
          claude_args: |
            --allowedTools "Read,Glob,Grep,mcp__github_inline_comment__create_inline_comment,Bash(git:*)"
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          prompt: |
            /code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }} --comment

            ## Monorepo context
            This is a monorepo with: backend (.NET 10 in services/ and shared/), frontend (React + Expo in frontend/), E2E tests (Playwright in e2e/).

            Changed areas in this PR:
            - Backend: ${{ steps.diff.outputs.backend }}
            - Frontend: ${{ steps.diff.outputs.frontend }}
            - E2E: ${{ steps.diff.outputs.e2e }}

            ## Changed files
            ```
            ${{ steps.diff.outputs.files }}
            ```

            ## Full diff (truncated to 128 KB — use Read tool for full files if needed)
            ```diff
            ${{ steps.diff.outputs.patch }}
            ```

            ## Review structure
            Organize your review into these sections:
            1. **Critical** — bugs, security issues, data loss risks (must fix)
            2. **Important** — logic errors, missing error handling, test gaps (should fix)
            3. **Suggestions** — style, naming, minor improvements (optional)

            Skip sections that have no findings. Do not comment on formatting — CI handles that.
