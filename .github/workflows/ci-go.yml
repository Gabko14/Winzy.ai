name: CI - Go Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/ci-go.yml'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/ci-go.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: winzy
          POSTGRES_USER: winzy
          POSTGRES_PASSWORD: winzy
        ports:
          - 5432:5432
        # tmpfs: RAM-backed data dir for throwaway CI data (winzy.ai-r1pf).
        # Path is /var/lib/postgresql/data on postgres:17 (not the PG18 parent).
        # GHA service containers cannot override `command`; write-speed GUCs
        # are applied via ALTER SYSTEM + pg_reload_conf in a step below.
        options: >-
          --health-cmd "pg_isready -U winzy -d winzy"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
          --tmpfs /var/lib/postgresql/data

    defaults:
      run:
        working-directory: backend

    env:
      TEST_DATABASE_URL: postgres://winzy:winzy@localhost:5432/winzy?sslmode=disable

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Tune test Postgres write-speed flags
        # GHA Postgres service containers do not support command overrides
        # (winzy.ai-r1pf). fsync / synchronous_commit / full_page_writes are
        # sighup GUCs — ALTER SYSTEM + pg_reload_conf is enough, no restart.
        working-directory: .
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client
          psql "$TEST_DATABASE_URL" \
            -c "ALTER SYSTEM SET fsync = off" \
            -c "ALTER SYSTEM SET synchronous_commit = off" \
            -c "ALTER SYSTEM SET full_page_writes = off" \
            -c "SELECT pg_reload_conf()"
          echo "=== verified GUCs after reload ==="
          psql "$TEST_DATABASE_URL" -c "SHOW fsync" -c "SHOW synchronous_commit" -c "SHOW full_page_writes"

      - name: gofmt check
        run: |
          fmt_out="$(gofmt -l .)"
          if [ -n "$fmt_out" ]; then
            echo "The following files are not gofmt-formatted:"
            echo "$fmt_out"
            exit 1
          fi

      - name: go vet
        run: go vet -tags=integration ./...

      - name: go build
        run: go build ./...

      - name: go test (race, verbose, unit + integration)
        # -p 1 serializes test packages: integration tests share one live
        # Postgres and dbtest truncates all tables per test, so concurrent
        # packages wipe each other's rows mid-test (found in winzy.ai-rdc7.3.1).
        run: go test -tags=integration -race -v -p 1 ./...
