name: CI - Backend

on:
  push:
    branches: [main]
    paths:
      - 'services/**'
      - 'shared/**'
      - 'Directory.Build.props'
      - 'global.json'
      - 'Winzy.slnx'
      - '.github/workflows/ci-backend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'services/**'
      - 'shared/**'
      - 'Directory.Build.props'
      - 'global.json'
      - 'Winzy.slnx'
      - '.github/workflows/ci-backend.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore Winzy.slnx

      - name: Build
        run: dotnet build Winzy.slnx --no-restore

      - name: Test
        run: dotnet test Winzy.slnx --no-build --logger "trx;LogFileName=results.trx" --results-directory ./test-results

      - name: Upload test results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: ./test-results/
          retention-days: 14

      - name: Format Check
        shell: bash
        run: set -o pipefail && dotnet format Winzy.slnx --verify-no-changes --no-restore 2>&1 | tee format-output.txt

      - name: Upload format output
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-format-output
          path: ./format-output.txt
          retention-days: 7
