name: CI - Backend

on:
  push:
    branches: [main]
    paths:
      - 'services/**'
      - 'shared/**'
      - 'Directory.Build.props'
      - 'global.json'
      - 'Winzy.slnx'
      - '.github/workflows/ci-backend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'services/**'
      - 'shared/**'
      - 'Directory.Build.props'
      - 'global.json'
      - 'Winzy.slnx'
      - '.github/workflows/ci-backend.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/gabko14/winzy

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore Winzy.slnx

      - name: Build
        run: dotnet build Winzy.slnx --no-restore

      - name: Test
        run: dotnet test Winzy.slnx --no-build --logger "trx;LogFileName=results.trx" --results-directory ./test-results

      - name: Upload test results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: ./test-results/
          retention-days: 14

      - name: Format Check
        shell: bash
        run: set -o pipefail && dotnet format Winzy.slnx --verify-no-changes --no-restore 2>&1 | tee format-output.txt

      - name: Upload format output
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-format-output
          path: ./format-output.txt
          retention-days: 7

  build-images:
    needs: build-and-test
    if: github.event.pull_request.head.repo.full_name == github.repository || github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        service:
          - name: gateway
            dockerfile: services/gateway/Dockerfile
          - name: auth-service
            dockerfile: services/auth-service/Dockerfile
          - name: habit-service
            dockerfile: services/habit-service/Dockerfile
          - name: social-service
            dockerfile: services/social-service/Dockerfile
          - name: challenge-service
            dockerfile: services/challenge-service/Dockerfile
          - name: notification-service
            dockerfile: services/notification-service/Dockerfile
          - name: activity-service
            dockerfile: services/activity-service/Dockerfile

    steps:
      - uses: actions/checkout@v4

      - name: Sanitize ref name for Docker tag
        id: ref
        run: echo "slug=$(echo '${{ github.ref_name }}' | sed 's/[^a-zA-Z0-9._-]/-/g' | cut -c1-128)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.service.name }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.service.dockerfile }}
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-${{ matrix.service.name }}:sha-${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}-${{ matrix.service.name }}:ref-${{ steps.ref.outputs.slug }}
          cache-from: type=gha,scope=${{ matrix.service.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service.name }}
