name: CI - E2E

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'e2e/**'
      - 'services/**'
      - 'docker-compose.yml'
      - 'docker-compose.ci.yml'
      - '.github/workflows/ci-e2e.yml'
  pull_request:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'e2e/**'
      - 'services/**'
      - 'docker-compose.yml'
      - 'docker-compose.ci.yml'
      - '.github/workflows/ci-e2e.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  APP_SERVICES: api-gateway auth-service habit-service social-service challenge-service notification-service activity-service

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      packages: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            frontend/package-lock.json
            e2e/package-lock.json

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image tag
        id: resolve-tag
        run: |
          SHA_TAG="sha-${{ github.sha }}"
          REF_TAG="ref-$(echo '${{ github.ref_name }}' | sed 's/[^a-zA-Z0-9._-]/-/g' | cut -c1-128)"

          # Try sha-exact first, then ref-branch fallback
          for TAG in "$SHA_TAG" "$REF_TAG"; do
            echo "Trying tag: $TAG"
            IMAGE_TAG="$TAG" docker compose -f docker-compose.yml -f docker-compose.ci.yml pull --quiet ${{ env.APP_SERVICES }} 2>/dev/null && {
              echo "tag=$TAG" >> "$GITHUB_OUTPUT"
              echo "pulled=true" >> "$GITHUB_OUTPUT"
              echo "Successfully pulled all images with tag: $TAG"
              exit 0
            }
            echo "Tag $TAG not available, trying next..."
          done

          echo "No pre-built images available, will build locally"
          echo "pulled=false" >> "$GITHUB_OUTPUT"

      - name: Start backend services (pre-built)
        if: steps.resolve-tag.outputs.pulled == 'true'
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml up -d --no-build --wait
        timeout-minutes: 3
        env:
          JWT_SECRET: ci-test-jwt-secret-minimum-32-characters-long!!
          IMAGE_TAG: ${{ steps.resolve-tag.outputs.tag }}

      - name: Start backend services (build fallback)
        if: steps.resolve-tag.outputs.pulled != 'true'
        run: docker compose -f docker-compose.yml up -d --build --wait
        timeout-minutes: 5
        env:
          JWT_SECRET: ci-test-jwt-secret-minimum-32-characters-long!!
          DOCKER_BUILDKIT: "1"
          COMPOSE_DOCKER_CLI_BUILD: "1"

      - name: Wait for gateway health
        run: |
          echo "Waiting for API gateway to report healthy..."
          for i in $(seq 1 60); do
            if curl -sf http://localhost:5050/health > /dev/null 2>&1; then
              echo "Gateway is healthy after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Gateway failed to become healthy within 60s"
          docker compose logs --tail=50
          exit 1
        env:
          JWT_SECRET: ci-test-jwt-secret-minimum-32-characters-long!!

      - name: Install frontend and E2E dependencies
        run: |
          cd frontend && npm ci & pid1=$!
          cd e2e && npm ci & pid2=$!
          wait $pid1
          wait $pid2

      - name: Build frontend static bundle
        run: cd frontend && npx expo export --platform web
        env:
          EXPO_PUBLIC_API_URL: http://localhost:5050

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('e2e/package-lock.json') }}

      - name: Install Playwright chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: cd e2e && npx playwright install --with-deps chromium

      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: cd e2e && npx playwright install-deps chromium

      - name: Run Playwright tests
        run: cd e2e && npx playwright test --config=playwright.config.ts
        env:
          CI: true
          API_URL: http://localhost:5050

      - name: Docker compose logs
        if: failure()
        run: docker compose logs --tail=100
        env:
          JWT_SECRET: ci-test-jwt-secret-minimum-32-characters-long!!

      - name: Upload test results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 14

      - name: Upload test traces
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: e2e/test-results/
          retention-days: 7

      - name: Stop backend services
        if: always()
        run: docker compose down
        env:
          JWT_SECRET: ci-test-jwt-secret-minimum-32-characters-long!!
