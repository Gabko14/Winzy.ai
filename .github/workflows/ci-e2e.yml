name: CI - E2E

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'e2e/**'
      - 'services/**'
      - 'docker-compose.yml'
      - '.github/workflows/ci-e2e.yml'
  pull_request:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'e2e/**'
      - 'services/**'
      - 'docker-compose.yml'
      - '.github/workflows/ci-e2e.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            frontend/package-lock.json
            e2e/package-lock.json

      - name: Start backend services
        run: docker compose -f docker-compose.yml up -d --build --wait
        timeout-minutes: 5
        env:
          JWT_SECRET: ci-test-jwt-secret-minimum-32-characters-long!!

      - name: Wait for gateway health
        run: |
          echo "Waiting for API gateway to report healthy..."
          for i in $(seq 1 60); do
            if curl -sf http://localhost:5050/health > /dev/null 2>&1; then
              echo "Gateway is healthy after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Gateway failed to become healthy within 60s"
          docker compose -f docker-compose.yml logs --tail=50
          exit 1
        env:
          JWT_SECRET: ci-test-jwt-secret-minimum-32-characters-long!!

      - name: Install frontend and E2E dependencies
        run: |
          cd frontend && npm ci &
          cd e2e && npm ci &
          wait

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('e2e/package-lock.json') }}

      - name: Install Playwright chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: cd e2e && npx playwright install --with-deps chromium

      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: cd e2e && npx playwright install-deps chromium

      - name: Run Playwright tests
        run: cd e2e && npx playwright test --config=playwright.config.ts
        env:
          CI: true
          API_URL: http://localhost:5050

      - name: Docker compose logs
        if: failure()
        run: docker compose -f docker-compose.yml logs --tail=100
        env:
          JWT_SECRET: ci-test-jwt-secret-minimum-32-characters-long!!

      - name: Upload test results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 14

      - name: Upload test traces
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: e2e/test-results/
          retention-days: 7

      - name: Stop backend services
        if: always()
        run: docker compose -f docker-compose.yml down
        env:
          JWT_SECRET: ci-test-jwt-secret-minimum-32-characters-long!!
