# Local stack: one Go API + one Postgres (winzy.ai-rdc7).
# Boot: docker compose up -d
# API listens on http://localhost:5050 (host) → container :8080.
# Frontend dev server runs outside compose: cd frontend && npm run web

networks:
  winzy-network:
    driver: bridge

volumes:
  winzy-db-data:

services:
  winzy-db:
    image: postgres:17-alpine
    # LOCAL/TEST instance only — trades crash-durability for speed (winzy.ai-r1pf).
    # NEVER copy these flags to production or Railway.
    command: postgres -c fsync=off -c synchronous_commit=off -c full_page_writes=off
    ports:
      - "5439:5432"
    environment:
      POSTGRES_DB: winzy
      POSTGRES_USER: winzy
      POSTGRES_PASSWORD: winzy
    volumes:
      - winzy-db-data:/var/lib/postgresql/data
    networks:
      - winzy-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U winzy -d winzy"]
      interval: 5s
      timeout: 3s
      retries: 5

  winzy-api:
    build:
      context: .
      dockerfile: backend/Dockerfile.railway
    ports:
      - "5050:8080"
    environment:
      PORT: "8080"
      DATABASE_URL: postgres://winzy:winzy@winzy-db:5432/winzy?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env — see .env.example}
      CORS_ORIGIN: ${WINZY_CORS_ORIGIN:-http://localhost:8081}
      WEB_DIST: /app/web
      LOG_LEVEL: info
      RATE_LIMIT_AUTH_PER_MINUTE: ${RATE_LIMIT_AUTH_PER_MINUTE:-1000}
      RATE_LIMIT_GENERAL_PER_MINUTE: ${RATE_LIMIT_GENERAL_PER_MINUTE:-10000}
    depends_on:
      winzy-db:
        condition: service_healthy
    networks:
      - winzy-network
