# Debug override — publishes application service and NATS ports on the host for direct access.
# Database ports are already exposed in docker-compose.yml (required for local dev).
# Usage: docker compose -f docker-compose.yml -f docker-compose.debug.yml up -d

services:
  # --- Infrastructure ---

  nats:
    ports:
      - "4222:4222"
      - "8222:8222"

  # --- Application Services ---

  auth-service:
    ports:
      - "5001:5001"

  habit-service:
    ports:
      - "5002:5002"

  social-service:
    ports:
      - "5003:5003"

  challenge-service:
    ports:
      - "5004:5004"

  notification-service:
    ports:
      - "5005:5005"

  activity-service:
    ports:
      - "5006:5006"
